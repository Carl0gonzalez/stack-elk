input {
  file {
    path => "/var/log/app/app.log"
    type => "app-logs"
    codec => json
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  if [type] == "app-logs" {
    # Parsear el timestamp
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
    
    # Agregar campos adicionales para análisis
    mutate {
      add_field => {
        "service" => "elk-lab-app"
        "environment" => "development"
      }
    }
    
    # Convertir level a keyword para mejor agregación
    mutate {
      convert => { "level" => "string" }
    }
    
    # Extraer información del path para análisis
    if [path] {
      grok {
        match => { "path" => "^(?<endpoint>[^?]+)" }
      }
    }
    
    # Agregar tags para facilitar filtrado
    if [level] == "error" {
      mutate {
        add_tag => [ "error" ]
      }
    }
    
    if [level] == "warn" {
      mutate {
        add_tag => [ "warning" ]
      }
    }
    
    if [level] == "info" {
      mutate {
        add_tag => [ "info" ]
      }
    }
  }
}

output {
  if [type] == "app-logs" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "app-logs-%{+YYYY.MM.dd}"
    }
    
    # También enviar a stdout para debugging
    stdout {
      codec => rubydebug
    }
  }
} 